<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영상통화 예약</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f2f3f7;
}

.dim{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
}

.popup{
  width:100%;
  max-width:420px;
  height:100%;
  background:#fff;
  display:flex;
  flex-direction:column;
  padding:20px;
  box-sizing:border-box;
  overflow-y:auto;
}

.popup-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.popup-header h1{
  font-size:18px;
  margin:0;
}

.close-btn{
  background:none;
  border:0;
  font-size:20px;
  cursor:pointer;
}

.description{
  font-size:15px;
  margin-bottom:24px;
}

/* section */
.time-section{
  margin-bottom:28px;
}

.time-section h2{
  font-size:14px;
  color:#555;
  margin-bottom:12px;
}

/* radio group */
.time-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

/* radio 숨김 */
.time-list input[type="radio"]{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

/* label을 버튼처럼 */
.time-label{
  flex:1 0 calc(25% - 8px);
  padding:12px 0;
  border-radius:10px;
  border:1px solid #dcdfe6;
  background:#f4f5f7;
  text-align:center;
  font-size:14px;
  cursor:pointer;
}

/* 선택 상태 */
.time-list input[type="radio"]:checked + .time-label{
  border:2px solid #2f6df6;
  background:#fff;
  color:#2f6df6;
  font-weight:600;
}

/* 비활성 */
.time-list input[type="radio"]:disabled + .time-label{
  background:#e9eaee;
  color:#aaa;
  border:1px solid #e0e0e0;
  cursor:not-allowed;
}

/* 알아두기 */
.notice-wrap{
  margin-top:10px;
  margin-bottom:24px;
}

.notice-wrap label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  cursor:pointer;
}

/* 선택 결과 박스 */
.selected-box{
  background:#eef1f7;
  padding:16px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  margin-bottom:20px;
}

/* submit 버튼 */
.submit-btn{
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2f6df6;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.submit-btn:disabled{
  background:#ccc;
  cursor:not-allowed;
}

button:focus,
input:focus + .time-label{
  outline:2px solid #000;
  outline-offset:2px;
}
</style>
</head>

<body>

<div class="dim">
<div class="popup"
     role="dialog"
     aria-modal="true"
     aria-labelledby="dialogTitle">

<form id="reservationForm">

  <div class="popup-header">
    <h1 id="dialogTitle">영상통화 예약</h1>
    <button type="button" class="close-btn" aria-label="닫기">×</button>
  </div>

  <p class="description">
    영상통화 가능한 시간을 선택해 주세요.
  </p>

  <!-- 오늘 -->
  <section class="time-section">
    <h2>오늘 / 2026.08.29</h2>

    <fieldset class="time-list">
      <legend class="visually-hidden">오늘 시간 선택</legend>

      <input type="radio" name="time" id="t09" value="2026.08.29 09시" disabled>
      <label for="t09" class="time-label">09시</label>

      <input type="radio" name="time" id="t10" value="2026.08.29 10시" disabled>
      <label for="t10" class="time-label">10시</label>

      <input type="radio" name="time" id="t11" value="2026.08.29 11시" disabled>
      <label for="t11" class="time-label">11시</label>

      <input type="radio" name="time" id="t12" value="2026.08.29 12시" checked>
      <label for="t12" class="time-label">12시</label>

      <input type="radio" name="time" id="t13" value="2026.08.29 13시" disabled>
      <label for="t13" class="time-label">13시</label>

      <input type="radio" name="time" id="t14" value="2026.08.29 14시" disabled>
      <label for="t14" class="time-label">14시</label>

      <input type="radio" name="time" id="t15" value="2026.08.29 15시" disabled>
      <label for="t15" class="time-label">15시</label>

      <input type="radio" name="time" id="t16" value="2026.08.29 16시" disabled>
      <label for="t16" class="time-label">16시</label>
    </fieldset>
  </section>

  <!-- 다음 영업일 -->
  <section class="time-section">
    <h2>다음 영업일 / 2026.08.30</h2>

    <fieldset class="time-list">
      <legend class="visually-hidden">다음 영업일 시간 선택</legend>

      <input type="radio" name="time" id="n09" value="2026.08.30 09시">
      <label for="n09" class="time-label">09시</label>

      <input type="radio" name="time" id="n10" value="2026.08.30 10시">
      <label for="n10" class="time-label">10시</label>

      <input type="radio" name="time" id="n11" value="2026.08.30 11시">
      <label for="n11" class="time-label">11시</label>

      <input type="radio" name="time" id="n12" value="2026.08.30 12시">
      <label for="n12" class="time-label">12시</label>

      <input type="radio" name="time" id="n13" value="2026.08.30 13시">
      <label for="n13" class="time-label">13시</label>

      <input type="radio" name="time" id="n14" value="2026.08.30 14시">
      <label for="n14" class="time-label">14시</label>

      <input type="radio" name="time" id="n15" value="2026.08.30 15시">
      <label for="n15" class="time-label">15시</label>

      <input type="radio" name="time" id="n16" value="2026.08.30 16시">
      <label for="n16" class="time-label">16시</label>
    </fieldset>
  </section>

  <!-- 알아두기 -->
  <div class="notice-wrap">
    <label>
      <input type="checkbox" name="notice">
      예약 전 유의사항을 확인했습니다.
    </label>
  </div>

  <!-- 선택 결과 -->
  <div class="selected-box" aria-live="polite">
    <span>고객님 선택 예약 시간</span>
    <strong id="selectedTime">2026.08.29 12시</strong>
  </div>

  <!-- 제출 -->
  <button type="submit" class="submit-btn">
    예약하기
  </button>

</form>
</div>
</div>

<script>
const radios = document.querySelectorAll('input[name="time"]');
const selectedTime = document.getElementById('selectedTime');

radios.forEach(radio => {
  radio.addEventListener('change', () => {
    selectedTime.textContent = radio.value;
  });
});

document.getElementById('reservationForm')
.addEventListener('submit', e => {
  e.preventDefault();
  alert("예약 완료: " + document.querySelector('input[name="time"]:checked').value);
});
</script>

</body>
</html>
